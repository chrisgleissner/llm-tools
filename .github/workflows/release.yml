name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Only attach the build artifacts. Do NOT regenerate release notes:
          # releases are drafted in the GitHub UI with auto-generated notes,
          # and this workflow runs on the resulting tag push. Re-generating
          # here would append a second copy of the notes to the existing
          # release body (the duplication bug).
          files: dist/*
