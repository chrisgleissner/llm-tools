# llm-tools example configuration
# -------------------------------
#
# Copy this file to one of these locations (first match wins):
#
#   $LLM_TOOLS_CONFIG                        (explicit path override)
#   $XDG_CONFIG_HOME/llm-tools/config.toml
#   ~/.config/llm-tools/config.toml
#
# Every key below is commented out, so the tools use their built-in defaults.
# Uncomment a line (delete the leading "# ") and edit it to apply that
# setting. Precedence: built-in defaults < this file < CLI flags.
#
# Run `<tool> --help` (e.g. `ralph-robin --help`) to see the value each
# flag expects (numbers, durations like "24h", comma-separated lists, etc.).


# ---------------------------------------------------------------------------
# Shared defaults applied to all three tools. Each tool can override these
# keys in its own [ralph] or [scheduler] table below.
# ---------------------------------------------------------------------------

[defaults]
# Order ralph-robin tries providers when --providers isn't given.
# Built-in default: ["claude", "codex", "opencode"].
#providers     = ["claude", "codex", "opencode"]
# Which capacity check to use. One of:
# auto | 5h | weekly | monthly | balance | budget | byok | ungated
#scope         = "auto"
# Minimum quota left before a provider is considered usable.
#min_remaining = 1


# ---------------------------------------------------------------------------
# Overall monthly spend budget for llm-usage. When set, every provider's
# add-on / pay-as-you-go cost (the "spend" rows) is drawn as a coloured progress
# bar against this single budget, and a summary "Budget" row totals them so you
# can see at a glance how much of your self-imposed monthly cap is gone (and by
# how much you have blown past it) -- instead of piecemeal funding providers and
# losing track. Only spend in the budget currency is counted. Without a budget,
# spend rows just show the amount and the total appears as a plain "Total" row.
# Env overrides: LLM_USAGE_MONTHLY_BUDGET, LLM_USAGE_BUDGET_CURRENCY.
# ---------------------------------------------------------------------------
[budget]
# The monthly ceiling all add-on spend is measured against (a positive number).
#monthly  = 50
# Display symbol for the budget amount. Built-in default: "$".
#currency = "$"


# ---------------------------------------------------------------------------
# Copilot pay-as-you-go (overage) spending limit.
#
# Copilot keeps working past its included monthly allowance via pay-as-you-go
# premium requests / AI Credits, but ONLY up to the spending limit you set in
# GitHub's billing settings. GitHub does not expose that limit through its API,
# so the dashboard cannot read it. Declare it here and llm-usage keeps Copilot
# "ready" (overage funded) while the month's billed spend stays under it, and
# flips to "no" once the limit is reached.
#
# When unset, llm-usage still auto-detects funded overage: if GitHub billing
# already shows premium-request/AI-Credit overage being charged this month, the
# included allowance being exhausted no longer forces Ready=no. With neither a
# declared limit nor charged overage, Copilot stays gated by its allowance.
# Env overrides: LLM_USAGE_COPILOT_SPEND_LIMIT, LLM_USAGE_COPILOT_SPEND_CURRENCY.
# ---------------------------------------------------------------------------
[copilot]
# Your GitHub Copilot premium-request monthly spending limit (a positive number).
#monthly_spend_limit = 25
# Display symbol for the limit amount. Built-in default: "$".
#currency            = "$"


# ---------------------------------------------------------------------------
# Per-provider routing policy. The main thing this lets you set is which
# model a provider should run, and what to do when that model's limit is
# used up (via allow_fallback).
#
# capacity_provider ties a provider's availability/capacity to ANOTHER
# provider's usage windows (5h / weekly / monthly / balance / ...), while still
# launching this provider's own CLI. Use it when the CLI is configured to run a
# different provider's model, so its own quota is irrelevant. It is generic:
# any provider may borrow any other provider's windows (one hop, no self / no
# chains). Example: OpenCode pointed at the MiniMax API -> see
# [providers.opencode] below.
# ---------------------------------------------------------------------------

[providers.claude]
# Run `claude --model sonnet`; only run while Sonnet has capacity.
#model          = "sonnet"
# What to do when Sonnet's limit is used up:
#  false -> skip claude and switch to the next provider
#  true  -> keep claude and let it pick another model
#allow_fallback = false
# Optional: override [defaults].scope / [defaults].min_remaining just here.
#scope          = "weekly"
#min_remaining  = 5

[providers.codex]
#model          = "spark"
#allow_fallback = false

[providers.copilot]
#model          = "..."
#allow_fallback = false

[providers.kilo]
#model          = "..."
#allow_fallback = false

[providers.opencode]
#model          = "..."
#allow_fallback = false
# Gate/rank/suspend opencode on minimax's real 5h/weekly windows instead of
# opencode's own balance — for when opencode runs the MiniMax model. ralph-robin
# then only routes to opencode while minimax has capacity.
#capacity_provider = "minimax"

[providers.minimax]
#model          = "..."
#allow_fallback = false


# ---------------------------------------------------------------------------
# Route mode (optional).
#
# A *route* is a schedulable launch path: a CLI provider, a model, a
# capacity policy, and a cost policy. The default rotation is over
# providers; this block opts ralph-robin into rotating over route ids
# instead. In the absence of [ralph].routes the legacy provider
# rotation is used, so existing configs do not need to migrate.
# ---------------------------------------------------------------------------

[ralph]
# Order ralph-robin tries routes when --routes isn't given.
#routes        = ["kilo-minimax-m3"]
#providers     = ["claude", "codex", "kilo"]

# A route is shaped like:
#
#   [routes.<route_id>]
#   provider = "<launch cli>"          # required
#   model    = "<model pin>"          # optional
#   allow_fallback = false
#
#   [routes.<route_id>.capacity]
#   policy  = "opaque"                # provider | provider_model | delegate
#                                     # | opaque | ungated | balance | budget
#   scope   = "subscription"          # displayed scope name
#   label   = "MiniMax M3 via Kilo"   # displayed label
#   # provider = "<delegate target>"  # required when policy = "delegate"
#
#   [routes.<route_id>.cost]
#   policy   = "fixed_subscription"   # display only — never affects readiness
#   amount   = 20
#   currency = "USD"
#   period   = "monthly"
#
# Motivating example: Kilo sells MiniMax M3 as a prepaid $20/mo
# subscription. The direct `mmx quota show` reads the user's *direct*
# MiniMax account, not the Kilo-purchased subscription, so it is the
# wrong truth source. Model the route as `opaque` so the table shows
# `prepaid $20/mo` and ralph does not rank on a missing window.
#
#   [routes.kilo-minimax-m3]
#   provider = "kilo"
#   model    = "minimax-coding-plan/MiniMax-M3"  # `kilo models minimax-coding-plan` lists exact ids
#   [routes.kilo-minimax-m3.capacity]
#   policy = "opaque"
#   scope  = "subscription"
#   label  = "MiniMax M3 via Kilo"
#   [routes.kilo-minimax-m3.cost]
#   policy   = "fixed_subscription"
#   amount   = 20
#   currency = "USD"
#   period   = "monthly"


# ---------------------------------------------------------------------------
# ralph-robin-only settings. Override [defaults] above.
# ---------------------------------------------------------------------------

[ralph]
#providers             = ["claude", "codex", "kilo"]
#scope                 = "auto"
#min_remaining         = 1
#poll_interval         = 60
#max_unavailable_wait  = 1800
#retry_delays          = [60, 300, 900]
#even_burn             = true
#max_iterations        = 50
#max_duration          = "24h"
#min_iteration_seconds = 30
#prefix                = true
#prefix_usage_interval = 5


# ---------------------------------------------------------------------------
# llm-scheduler-only settings. Override [defaults] above.
# ---------------------------------------------------------------------------

[scheduler]
#provider              = "claude"
#scope                 = "auto"
#min_remaining         = 1
#poll_interval         = 60
#max_unavailable_wait  = 1800
#retry_delays          = [60, 300, 900]
